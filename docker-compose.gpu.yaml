# GPU override configuration for Docker Compose
# Run with: docker compose -f docker-compose.yaml -f docker-compose.gpu.yaml up -d
services:
  app:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
